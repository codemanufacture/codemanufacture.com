{{ define "main" }}
<section class="default-list">
  <div class="default-list__inner">
    <header class="default-list__header">
      <h1 class="default-list__title">{{ .Title }}</h1>
      {{ with .Description }}
      <p class="default-list__description">{{ . }}</p>
      {{ end }}
    </header>
    <div class="default-list__grid">
      {{ range .Pages }} {{ partial "blog-post-card.html" . }} {{ end }}
    </div>
  </div>
</section>
{{ end }}
