<header class="site-header">
  <div class="site-header__inner">
    <div class="site-header__row">
      <!-- Logo -->
      <div class="site-header__logo">
        <a href="/">
          <span class="sr-only">Codemanufacture</span>
          <img src="/images/logo.svg" alt="Codemanufacture" />
        </a>
      </div>

      <!-- Mobile menu button -->
      <div class="site-header__menu-toggle">
        <button
          type="button"
          id="mobile-menu-button"
          aria-expanded="false"
        >
          <span class="sr-only">Open menu</span>
          <svg
            class="site-header__menu-icon"
            id="menu-icon-open"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
            />
          </svg>
          <svg
            class="site-header__menu-icon hidden"
            id="menu-icon-close"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        </button>
      </div>

      <!-- Desktop Navigation -->
      <div class="site-header__nav">
        <nav>
          <a href="/">Home</a>
          <a href="/#services">Services</a>
          <a href="/#blog">Blog</a>
          <a href="/#contact">Contact</a>
        </nav>
      </div>
    </div>
  </div>

  <!-- Mobile menu panel -->
  <div class="site-header__mobile-panel hidden" id="mobile-menu">
    <div class="site-header__mobile-card">
      <div class="site-header__mobile-top">
        <div class="site-header__mobile-top-bar">
          <div>
            <img src="/images/logo.svg" alt="Codemanufacture" />
          </div>
          <div class="site-header__mobile-close">
            <button type="button" id="mobile-menu-close">
              <span class="sr-only">Close menu</span>
              <svg
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                aria-hidden="true"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M6 18L18 6M6 6l12 12"
                />
              </svg>
            </button>
          </div>
        </div>
        <div class="site-header__mobile-nav">
          <nav>
            <a href="/">Home</a>
            <a href="/#services">Services</a>
            <a href="/#blog">Blog</a>
            <a href="/#contact">Contact</a>
          </nav>
        </div>
      </div>
    </div>
  </div>
</header>
