{{ define "main" }}
<!-- JSON-LD Schema -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "CollectionPage",
  "name": {{ .Title | jsonify }},
  "description": "Insights and best practices for Magento development.",
  "url": "{{ .Permalink }}",
  "mainEntity": {
    "@type": "ItemList",
    "itemListElement": [
      {{- range $i, $page := .Pages -}}
      {{ if $i }},{{ end }}
      {
        "@type": "ListItem",
        "position": {{ add $i 1 }},
        "url": "{{ $page.Permalink }}",
        "name": {{ $page.Title | jsonify }}
      }
      {{- end -}}
    ]
  }
}
</script>

<section class="blog-listing">
  <div class="split-bg">
    <div></div>
  </div>
  <div class="blog-listing__inner">
    <div class="blog-listing__header">
      <h1 class="blog-listing__title">Blog</h1>
      <p class="blog-listing__subtitle">
        Insights and best practices for Magento development.
      </p>
    </div>
    <div class="blog-listing__grid">
      {{ range .Pages }} {{ partial "blog-post-card.html" . }} {{ end }}
    </div>
  </div>
</section>
{{ end }}
